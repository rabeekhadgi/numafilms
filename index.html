<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading...</title>

  <!-- Redirect after short delay -->
  <meta http-equiv="refresh" content="1.2; url=https://script.google.com/macros/s/AKfycbzDFvh4rgvzevK0U_1Slv3BfQtsFqzzQirGokyejidH6BMTCXgcmHAsC4wi6GrQi_rLjQ/exec">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
    }

    .container {
      text-align: center;
      animation: fadeIn 0.6s ease-in-out;
    }

    .logo {
      width: 70px;
      height: 70px;
      border-radius: 16px;
      background: white;
      margin: 0 auto 20px;
      animation: pulse 1.2s infinite;
    }

    .text {
      font-size: 18px;
      opacity: 0.85;
      letter-spacing: 0.5px;
    }

    .spinner {
      margin: 20px auto 0;
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.7; }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="logo"></div>
    <div class="text">Launching your app...</div>
    <div class="spinner"></div>
  </div>
</body>
</html>
