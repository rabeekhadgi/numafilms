<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting...</title>

  <script>
    const url = "https://youtube.com";
    setTimeout(() => window.location.replace(url), 700);
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(circle at top, #1e293b, #0f172a);
      color: white;
      overflow: hidden;
    }

    .card {
      width: 280px;
      text-align: center;
      padding: 26px 22px;
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 50px rgba(0,0,0,0.45);
      animation: pop 0.35s ease-out;
    }

    .icon-wrap {
      width: 64px;
      height: 64px;
      margin: 0 auto 14px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      animation: float 1.6s ease-in-out infinite;
    }

    .title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      opacity: 0.75;
      margin-bottom: 18px;
    }

    .loader {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 10px;
    }

    .dot {
      width: 7px;
      height: 7px;
      background: white;
      border-radius: 50%;
      opacity: 0.4;
      animation: bounce 1s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.15s; }
    .dot:nth-child(3) { animation-delay: 0.3s; }

    .footer {
      margin-top: 14px;
      font-size: 11px;
      opacity: 0.5;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50% { transform: translateY(-5px); opacity: 1; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    @keyframes pop {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    svg {
      width: 28px;
      height: 28px;
      fill: white;
      opacity: 0.95;
    }
  </style>
</head>

<body>
  <div class="card">

    <!-- Icon -->
    <div class="icon-wrap">
      <!-- Link/redirect icon (SVG) -->
      <svg viewBox="0 0 24 24">
        <path d="M10.59 13.41a1.996 1.996 0 0 0 2.82 0l3.59-3.59a2 2 0 0 0-2.83-2.83l-1.3 1.3a1 1 0 1 1-1.41-1.41l1.3-1.3a4 4 0 1 1 5.66 5.66l-3.59 3.59a4 4 0 0 1-5.66 0 1 1 0 0 1 1.42-1.42z"/>
        <path d="M13.41 10.59a1.996 1.996 0 0 0-2.82 0l-3.59 3.59a2 2 0 1 0 2.83 2.83l1.3-1.3a1 1 0 0 1 1.41 1.41l-1.3 1.3a4 4 0 1 1-5.66-5.66l3.59-3.59a4 4 0 0 1 5.66 0 1 1 0 0 1-1.42 1.42z"/>
      </svg>
    </div>

    <div class="title">Redirecting</div>
    <div class="subtitle">Taking you to your destination</div>

    <!-- Animated dots -->
    <div class="loader">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <div class="footer">
      <!-- small shield icon -->
      <svg viewBox="0 0 24 24">
        <path d="M12 2l7 4v6c0 5-3.5 9.4-7 10-3.5-.6-7-5-7-10V6l7-4z"/>
      </svg>
      Secure redirect
    </div>

  </div>
</body>
</html>
