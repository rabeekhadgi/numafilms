<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Numa Films</title>
  <script>
    setTimeout(() => window.location.replace("https://script.google.com/macros/s/AKfycbybU5KLGr1SJMmHPJIT8-IGCQMwnWDrY58xc8cXTXb10jOyGE4JdwvzsqJjTGzWxQ_z/exec"), 1000);
  </script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#f3f4f6;
      font-family:Arial,sans-serif;
    }
    .wrap{
      text-align:center;
      animation:up .4s cubic-bezier(.22,1,.36,1) both;
    }
    img{
      width:64px;
      height:64px;
      border-radius:16px;
      display:block;
      margin:0 auto 20px;
    }
    p{
      color:#9ca3af;
      font-size:13px;
      letter-spacing:.3px;
      margin-top:28px;
    }
    .bar{
      width:120px;
      height:3px;
      background:#e5e7eb;
      border-radius:99px;
      margin:12px auto 0;
      overflow:hidden;
    }
    .fill{
      height:100%;
      width:0%;
      background:#2563eb;
      border-radius:99px;
      animation:load 0.9s cubic-bezier(.4,0,.2,1) forwards;
    }
    @keyframes load{to{width:100%}}
    @keyframes up{
      from{opacity:0;transform:translateY(12px)}
      to{opacity:1;transform:translateY(0)}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="https://raw.githubusercontent.com/rabeekhadgi/Hosted-Files/main/Numa%20Films.png" alt="Numa Films">
    <div class="bar"><div class="fill"></div></div>
    <p>Loading...</p>
  </div>
</body>
</html>
